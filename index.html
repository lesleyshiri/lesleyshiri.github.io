<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Lesley L. Shiri | Data Health Design Community</title>
    <link href='https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap' rel='stylesheet'>
    <style>
        *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --terracotta: #C1440E; --sienna: #E07B39; --parchment: #F5ECD7;
            --moss: #5C6B3A; --light-moss: #8A9B6A; --espresso: #2C1A0E;
            --cream: #FBF6EE; --sand: #EAD8B8; --warm-white: #FEFAF4;
        }
        body {
            background: linear-gradient(to bottom, #A9BCC8, #7FA2B5, #4F7F9B);
            color: var(--espresso); font-family: 'DM Sans', sans-serif;
            overflow-x: hidden; line-height: 1.6;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 20px 60px; display: flex; align-items: center;
            justify-content: space-between; background: rgba(11, 24, 43, 0.8);
            backdrop-filter: blur(10px);
        }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--parchment); text-decoration: none; font-size: 14px; }
        #hero {
            min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
            align-items: center; padding: 120px 60px; gap: 60px;
        }
        .hero-name { font-family: 'Playfair Display', serif; font-size: 64px; color: var(--espresso); }
        .hero-name em { color: var(--terracotta); font-style: italic; }
        .hero-tagline { font-size: 18px; margin: 20px 0; max-width: 450px; }
        .btn {
            display: inline-block; padding: 12px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 500; transition: 0.3s;
        }
        .btn-primary { background: #1a3d7a; color: white; }
        .btn-outline { border: 1.5px solid var(--espresso); color: var(--espresso); margin-left: 15px; }
        .photo-frame {
            width: 320px; height: 380px; border-radius: 30px; overflow: hidden;
            border: 2px solid #D4A853; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        footer { padding: 40px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <a href='#'><img src='logo.png' alt='LS' style='height: 40px;'></a>
        <ul class='nav-links'>
            <li><a href='#about'>About</a></li>
            <li><a href='#projects'>Projects</a></li>
            <li><a href='#skills'>Skills</a></li>
            <li><a href='#contact'>Contact</a></li>
        </ul>
    </nav>
    <section id='hero'>
        <div>
            <p style='text-transform: uppercase; letter-spacing: 2px; color: var(--moss);'>Accounting & Finance</p>
            <h1 class='hero-name'>Lesley<br><em>Shiri</em></h1>
            <p class='hero-tagline'>I help organizations turn <strong>financial data</strong> into decisions that drive performance and growth.</p>
            <div>
                <a href='#projects' class='btn btn-primary'>View Portfolio</a>
                <a href='#contact' class='btn btn-outline'>Connect</a>
            </div>
        </div>
        <div style='display: flex; justify-content: center;'>
            <div class='photo-frame'>
                <img src='profile.jpg' alt='Lesley' style='width: 100%; height: 100%; object-fit: cover;'>
            </div>
        </div>
    </section>
    <footer>
        <p>© 2026 Lesley Shiri | Business Analyst · MBA · Payroll Specialist</p>
    </footer>
</body>
</html>
